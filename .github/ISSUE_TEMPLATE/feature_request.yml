name: Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the feature you'd like to see.
      placeholder: e.g. Add support for X
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: e.g. Currently there is no way to do X, which makes Y difficult.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work.
      placeholder: e.g. Expose a new option `foo` that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about?
      placeholder: e.g. Could also be done via X, but...
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, references, screenshots, or anything else relevant.
    validations:
      required: false
